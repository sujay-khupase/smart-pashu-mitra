{% extends "base.html" %}
{% block title %}Register Animal — Smart Pashu Mitra{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <div class="section-label">Register</div>
    <h1>Register an Animal</h1>
    <p>Link the animal to its owner in the register.</p>
  </div>
</div>

<form method="POST" class="form-card">
  <div class="field">
    <label for="farmer_id">Owner (Farmer)</label>
    <select id="farmer_id" name="farmer_id" required>
      <option value="" disabled selected>Select farmer</option>
      {% for f in farmers %}
      <option value="{{ f.farmer_id }}">{{ f.name }} — {{ f.village }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label for="name">Animal Name / Tag</label>
    <input type="text" id="name" name="name" placeholder="e.g. Gauri" required>
  </div>
  <div class="field">
    <label for="breed">Breed</label>
    <input type="text" id="breed" name="breed" placeholder="e.g. Gir, Jersey, HF Cross" required>
  </div>
  <div class="field">
    <label for="age">Age (years)</label>
    <input type="number" id="age" name="age" min="0" step="1" required>
  </div>
  <div class="field">
    <label for="weight">Weight (kg)</label>
    <input type="number" id="weight" name="weight" min="0" step="0.1" required>
  </div>
  <button type="submit" class="btn btn-primary">Save Animal</button>
  <a href="{{ url_for('animals') }}" class="btn btn-outline">Cancel</a>
</form>

{% endblock %}
