{% extends "base.html" %}
{% block title %}Officer Login — Smart Pashu Mitra{% endblock %}
{% block content %}

<div class="login-wrap">
  <div class="login-card">
    <span class="login-icon">🏥</span>
    <h1>Veterinary Officer Login</h1>
    <p class="login-sub">Animal Husbandry Dept. · Jalgaon Jamod</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Officer username"
          autocomplete="username"
          required
          autofocus
        >
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:4px;">
        Log In
      </button>
    </form>

    <p style="margin-top:20px; font-size:0.82rem; color:var(--color-ink-soft); text-align:center;">
      Are you a farmer? <a href="{{ url_for('farmer_portal') }}">Go to Farmer Portal →</a>
    </p>
  </div>
</div>

{% endblock %}
